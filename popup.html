<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <title>族語魔書</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header>
    <img src="icons/icon16.png" alt="">
    <span class="title">族語魔書</span>
    <span id="toggle-label">啟用</span>
    <button id="toggle" class="sw" title="啟用/停用提示框"></button>
  </header>

  <div class="row">
    <span class="lbl">語言</span>
    <select id="language">
      <option value="">全部</option>
    </select>
  </div>

  <div class="row display-row">
    <span class="lbl">顯示模式</span>
    <div class="display-actions">
      <button class="display-button" data-group="displayTarget" data-value="tooltip" type="button">
        <span>提示框</span>
      </button>
      <button class="display-button" data-group="displayTarget" data-value="companion" type="button">
        <span>側欄</span>
      </button>
    </div>
  </div>

  <div class="compact-controls" aria-label="快速設定">
    <button class="compact-toggle" id="aiTools" type="button" title="提示框 AI 翻譯與 TTS">
      <span>AI工具</span>
      <span class="sw" aria-hidden="true"></span>
    </button>
    <button class="compact-toggle" id="altSpelling" type="button" title="相近拼法搜尋">
      <span>替拼</span>
      <span class="sw" aria-hidden="true"></span>
    </button>
    <button class="compact-toggle" id="triggerHover" type="button" title="滑鼠懸停查詢">
      <span>懸停</span>
      <span class="sw" aria-hidden="true"></span>
    </button>
  </div>

  <div class="row">
    <span class="lbl">主題</span>
    <div class="pills">
      <button class="pill" data-group="theme" data-value="dark">夜</button>
      <button class="pill" data-group="theme" data-value="light">晝</button>
      <button class="pill" data-group="theme" data-value="paper">緋紙</button>
      <button class="pill" data-group="theme" data-value="field">苔野</button>
    </div>
  </div>

  <div class="row">
    <span class="lbl">字體</span>
    <div class="pills">
      <button class="pill" data-group="font" data-value="small">小</button>
      <button class="pill" data-group="font" data-value="medium">中</button>
      <button class="pill" data-group="font" data-value="large">大</button>
    </div>
  </div>

  <div class="footer-actions">
    <button id="opts" type="button">
      <svg viewBox="0 0 16 16" aria-hidden="true">
        <path d="M6.7 2.4h2.6l.4 1.5 1.4.6 1.4-.8 1.3 2.2-1.1 1.1.1 1.5 1.1 1.1-1.3 2.2-1.4-.8-1.4.6-.4 1.5H6.7l-.4-1.5-1.4-.6-1.4.8-1.3-2.2 1.1-1.1-.1-1.5-1.1-1.1 1.3-2.2 1.4.8 1.4-.6z"></path>
        <circle cx="8" cy="8" r="2"></circle>
      </svg>
      <span>設定</span>
    </button>
    <button id="saved" type="button">
      <svg viewBox="0 0 16 16" aria-hidden="true">
        <path d="M4.5 2.5h7v11L8 11.2l-3.5 2.3z"></path>
      </svg>
      <span>儲存</span>
    </button>
  </div>

  <script src="shared.js"></script>
  <script src="saved_store.js"></script>
  <script src="popup.js"></script>
</body>
</html>
