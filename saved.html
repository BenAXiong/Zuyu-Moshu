<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <title>族語魔書</title>
  <link rel="stylesheet" href="saved.css">
</head>
<body>
  <header class="topbar">
    <h1>族語魔書</h1>
    <nav class="tabs" aria-label="saved workspace sections">
      <button class="tab is-active" type="button" data-tab="library" aria-current="page">咒語庫</button>
      <button class="tab" type="button" data-tab="paragraph">短章分析</button>
      <button class="tab" type="button" data-tab="paragraph-star">短章分析*</button>
      <button class="tab" type="button" data-tab="ai-mt-tts">AI MT &amp; TTS</button>
      <button class="tab" type="button" data-tab="kilang">Kilang</button>
      <button class="tab" type="button" data-tab="exam">族語考試</button>
      <button class="tab" type="button" data-tab="help">?</button>
    </nav>
    <div class="topbar-spacer" aria-hidden="true"></div>
  </header>

  <main>
    <section id="panel-library" class="workspace-panel is-active" data-panel="library">
      <section class="filters" aria-label="filters">
        <input id="search" type="search" placeholder="搜尋族語、中文、詞根">
        <select id="typeFilter">
          <option value="">全部類型</option>
          <option value="word">詞</option>
          <option value="sense">義項</option>
          <option value="example">例句</option>
        </select>
        <select id="languageFilter">
          <option value="">全部語言</option>
        </select>
      </section>

      <section class="list-tools" aria-label="saved item actions">
        <p id="summary">0 items</p>
        <div class="list-actions">
          <label class="toggle">
            <input id="showSenseExamples" type="checkbox" checked>
            <span>展開義項例句</span>
          </label>
          <button id="copySelected" type="button">複製選取</button>
          <button id="deleteSelected" class="delete" type="button">刪除選取</button>
          <button id="exportIndiHunt" class="with-icon" type="button">
            <img src="assets/indivore/icon128.png" alt="" width="18" height="18">
            <span>Export to IndiHunt</span>
          </button>
        </div>
      </section>

      <section id="empty" class="empty" hidden>尚未儲存任何項目。</section>
      <div class="list-header" aria-hidden="true">
        <span></span>
        <span>語言</span>
        <span>詞根</span>
        <span>內容</span>
        <span></span>
      </div>
      <section id="list" class="list" aria-live="polite"></section>
    </section>

    <section id="panel-paragraph" class="workspace-panel paragraph-panel" data-panel="paragraph" hidden>
      <section class="paragraph-tools" aria-label="paragraph analysis controls">
        <div class="paragraph-selectors">
          <select id="analysisLanguage" aria-label="Analysis language">
            <option value="Amis">Amis 阿美語</option>
          </select>
          <select id="analysisSource" aria-label="Analysis source">
            <option value="KILANG">Kilang</option>
            <option value="EPARK">ePark</option>
          </select>
          <button id="analyzeText" class="ai-primary" type="button">Analyze</button>
          <button id="analysisSampleText" type="button" title="Load sample text">.</button>
        </div>
        <div class="analysis-toolbar-right">
          <div class="analysis-filterbar" aria-label="analysis filters">
            <button class="analysis-filter" type="button" data-analysis-filter="ab" aria-pressed="false">族語</button>
            <button class="analysis-filter" type="button" data-analysis-filter="roots" aria-pressed="false">roots</button>
            <button class="analysis-filter" type="button" data-analysis-filter="zh" aria-pressed="false">中文</button>
            <button class="analysis-filter" type="button" data-analysis-filter="duplicates" aria-pressed="false">duplicates</button>
            <button class="analysis-filter" type="button" data-analysis-filter="saved" aria-pressed="false">saved</button>
          </div>
          <span id="analysisWordCount" class="analysis-summary" aria-live="polite">0 token analyzed / 0 shown</span>
        </div>
      </section>

      <section class="analysis-workbench" aria-label="analysis input and sentences">
        <textarea id="analysisInput" class="analysis-input" rows="7" wrap="off" placeholder="貼上族語短文"></textarea>
        <section class="analysis-results" aria-label="analysis results">
          <div id="analysisList" class="analysis-table-wrap">
            <div class="analysis-empty">Paste text and run Analyze.</div>
          </div>
        </section>
      </section>
    </section>

    <section id="panel-paragraph-star" class="workspace-panel reader-panel" data-panel="paragraph-star" hidden>
      <section class="reader-tools" aria-label="annotated analysis controls">
        <div class="reader-selectors">
          <select id="readerLanguage" aria-label="Reader analysis language">
            <option value="Amis">Amis 阿美語</option>
          </select>
          <select id="readerSource" aria-label="Reader analysis source">
            <option value="KILANG">Kilang</option>
            <option value="EPARK">ePark</option>
          </select>
          <button id="readerAnalyze" class="ai-primary" type="button">Analyze</button>
          <button id="readerSampleText" type="button" title="Load sample text">.</button>
          <button id="readerDividerToggle" type="button" title="Toggle sentence lines" aria-pressed="false">-</button>
        </div>
        <span id="readerSummary" class="analysis-summary" aria-live="polite">0 token analyzed / 0 sentence</span>
      </section>

      <textarea id="readerInput" class="reader-input" rows="5" placeholder="貼上族語短文"></textarea>
      <nav id="readerNav" class="reader-nav" aria-label="sentence navigation"></nav>
      <section id="readerOutput" class="reader-output" aria-label="annotated text output">
        <div class="reader-empty">Paste text and run Analyze.</div>
      </section>
    </section>

    <section id="panel-ai-mt-tts" class="workspace-panel ai-panel" data-panel="ai-mt-tts" hidden>
      <div class="ai-direction">
        <button class="direction-option is-active" type="button" data-direction="zh-to-x">ZH → 族語</button>
        <button class="direction-option" type="button" data-direction="x-to-zh">族語 → ZH</button>
      </div>
      <div class="ai-selectors">
        <select id="aiLanguage" aria-label="Language">
          <option value="ami">Amis 阿美語</option>
          <option value="tay">Atayal 泰雅語</option>
          <option value="pwn">Paiwan 排灣語</option>
          <option value="bnn">Bunun 布農語</option>
          <option value="pyu">Puyuma 卑南語</option>
          <option value="dru">Rukai 魯凱語</option>
          <option value="tsu">Tsou 鄒語</option>
          <option value="xsy">Saisiyat 賽夏語</option>
          <option value="tao">Tao 達悟語</option>
          <option value="ssf">Thao 邵語</option>
          <option value="ckv">Kavalan 噶瑪蘭語</option>
          <option value="trv">Truku 太魯閣語</option>
          <option value="szy">Sakizaya 撒奇萊雅語</option>
          <option value="see">Sediq 賽德克語</option>
          <option value="xnb">Kanakanavu 卡那卡那富語</option>
          <option value="sxr">Saaroa 拉阿魯哇語</option>
        </select>
        <select id="aiDialect" aria-label="Amis dialect">
          <option value="ami_Coas">Coastal 海岸</option>
          <option value="ami_Heng">Hengchun 恆春</option>
          <option value="ami_Mala">Malan 馬蘭</option>
          <option value="ami_Sout">Southern 南部</option>
          <option value="ami_Xiug">Xiuguluan 秀姑巒</option>
        </select>
      </div>
      <div class="ai-grid">
        <textarea id="aiInput" class="ai-textarea" rows="10" placeholder="輸入文字"></textarea>
        <textarea id="aiOutput" class="ai-textarea" rows="10" placeholder="輸出" readonly></textarea>
      </div>
      <div class="ai-actions">
        <button id="aiTranslate" class="ai-primary" type="button">
          <span aria-hidden="true">✦</span>
          <span>Translate</span>
        </button>
        <button id="aiListen" type="button">
          <span aria-hidden="true">〰</span>
          <span>Listen</span>
        </button>
      </div>
    </section>

    <section id="panel-kilang" class="workspace-panel" data-panel="kilang" hidden></section>
    <section id="panel-exam" class="workspace-panel" data-panel="exam" hidden></section>
    <section id="panel-help" class="workspace-panel" data-panel="help" hidden></section>
  </main>

  <script src="shared.js"></script>
  <script src="saved_store.js"></script>
  <script src="saved.js"></script>
</body>
</html>
