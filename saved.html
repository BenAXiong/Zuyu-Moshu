<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <title>族語魔書</title>
  <link rel="stylesheet" href="saved.css">
</head>
<body>
  <header class="topbar">
    <h1>族語魔書</h1>
    <nav class="tabs" aria-label="saved workspace sections">
      <button class="tab is-active" type="button" data-tab="library" aria-current="page">咒語庫</button>
      <button class="tab" type="button" data-tab="paragraph">短章分析</button>
      <button class="tab" type="button" data-tab="ai-mt-tts">AI MT &amp; TTS</button>
      <button class="tab" type="button" data-tab="kilang">Kilang</button>
    </nav>
    <div class="topbar-spacer" aria-hidden="true"></div>
  </header>

  <main>
    <section id="panel-library" class="workspace-panel is-active" data-panel="library">
      <section class="filters" aria-label="filters">
        <input id="search" type="search" placeholder="搜尋族語、中文、詞根">
        <select id="typeFilter">
          <option value="">全部類型</option>
          <option value="word">詞</option>
          <option value="sense">義項</option>
          <option value="example">例句</option>
        </select>
        <select id="languageFilter">
          <option value="">全部語言</option>
        </select>
      </section>

      <section class="list-tools" aria-label="saved item actions">
        <p id="summary">0 items</p>
        <div class="list-actions">
          <label class="toggle">
            <input id="showSenseExamples" type="checkbox" checked>
            <span>展開義項例句</span>
          </label>
          <button id="copySelected" type="button">複製選取</button>
          <button id="deleteSelected" class="delete" type="button">刪除選取</button>
          <button id="exportIndiHunt" class="with-icon" type="button">
            <img src="assets/indivore/icon128.png" alt="" width="18" height="18">
            <span>Export to IndiHunt</span>
          </button>
        </div>
      </section>

      <section id="empty" class="empty" hidden>尚未儲存任何項目。</section>
      <div class="list-header" aria-hidden="true">
        <span></span>
        <span>語言</span>
        <span>詞根</span>
        <span>內容</span>
        <span></span>
      </div>
      <section id="list" class="list" aria-live="polite"></section>
    </section>

    <section id="panel-paragraph" class="workspace-panel" data-panel="paragraph" hidden></section>

    <section id="panel-ai-mt-tts" class="workspace-panel ai-panel" data-panel="ai-mt-tts" hidden>
      <div class="ai-direction">
        <button class="direction-option is-active" type="button" data-direction="zh-to-x">ZH → 族語</button>
        <button class="direction-option" type="button" data-direction="x-to-zh">族語 → ZH</button>
      </div>
      <div class="ai-grid">
        <textarea id="aiInput" class="ai-textarea" rows="10" placeholder="輸入文字"></textarea>
        <textarea id="aiOutput" class="ai-textarea" rows="10" placeholder="輸出" readonly></textarea>
      </div>
      <div class="ai-actions">
        <button id="aiTranslate" class="ai-primary" type="button">
          <span aria-hidden="true">✦</span>
          <span>Translate</span>
        </button>
        <button id="aiListen" type="button">
          <span aria-hidden="true">〰</span>
          <span>Listen</span>
        </button>
      </div>
    </section>

    <section id="panel-kilang" class="workspace-panel" data-panel="kilang" hidden></section>
  </main>

  <script src="saved_store.js"></script>
  <script src="saved.js"></script>
</body>
</html>
