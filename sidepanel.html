<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Companion</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <header class="companion-top">
    <div class="theme-switcher" aria-label="主題">
      <button type="button" class="theme-pill theme-pill-dark" data-theme="dark" title="夜">夜</button>
      <button type="button" class="theme-pill theme-pill-light" data-theme="light" title="晝">晝</button>
      <button type="button" class="theme-pill theme-pill-paper" data-theme="paper" title="緋紙">緋紙</button>
      <button type="button" class="theme-pill theme-pill-field" data-theme="field" title="苔野">苔野</button>
    </div>
    <div class="header-actions">
      <div id="readerControls" class="reader-controls" aria-label="句子顯示控制" hidden>
        <button type="button" class="companion-icon-button reader-control-button" data-reader-control="topAnnotations" title="顯示上方註記" aria-label="顯示上方註記" aria-pressed="true">~</button>
        <button type="button" class="companion-icon-button reader-control-button" data-reader-control="zhGloss" title="顯示中文 gloss" aria-label="顯示中文 gloss" aria-pressed="true">中</button>
        <button type="button" class="companion-icon-button reader-control-button" data-reader-control="dividers" title="顯示句間分隔線" aria-label="顯示句間分隔線" aria-pressed="true">─</button>
        <button type="button" class="companion-icon-button reader-control-button" data-reader-control="wordTable" title="顯示逐詞表" aria-label="顯示逐詞表" aria-pressed="true">表</button>
      </div>
      <button id="topExport" type="button" class="companion-icon-button companion-export-button" title="Export to IndiHunt" aria-label="Export to IndiHunt">
        <img src="assets/indivore/icon128.png" alt="" width="18" height="18">
      </button>
      <button id="clear" type="button" class="companion-icon-button" title="清除" aria-label="清除">
        <svg viewBox="0 0 16 16" aria-hidden="true">
          <path d="M5.2 2.5h5.6l2.2 3.1-5.9 7.9H2.3L1 12.2l5.9-7.9z"></path>
          <path d="M4.2 10.3h4.5"></path>
        </svg>
      </button>
    </div>
  </header>

  <nav class="mode-tabs" aria-label="Companion modes">
    <button class="mode-tab active" type="button" data-mode="lookup">單詞</button>
    <button class="mode-tab" type="button" data-mode="analysis">句子</button>
    <button class="mode-tab" type="button" data-mode="ai">AI</button>
  </nav>

  <form id="manualSearch" class="manual-search" autocomplete="off">
    <input id="manualSearchInput" type="search" placeholder="輸入族語、中文、短句" aria-label="手動查詢">
    <button type="submit" title="查詢" aria-label="查詢">⌕</button>
  </form>

  <main id="content" class="content empty">
    <div class="empty-state">
      <strong>選取文字開始</strong>
      <span>將查詢顯示切換到 Companion 後，雙擊或 Ctrl+選取文字會在這裡顯示。</span>
    </div>
  </main>

  <script src="shared.js"></script>
  <script src="appearance.js"></script>
  <script src="saved_store.js"></script>
  <script src="lookup_core.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
